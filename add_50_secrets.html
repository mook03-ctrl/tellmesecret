    <script type="module">

        const firebaseConfig = {
            apiKey: "AIzaSyBUqe-XAbE1XkUh0i511LJ82emllR1AAFQ",
            authDomain: "tellmescret.firebaseapp.com",
            projectId: "tellmescret",
            storageBucket: "tellmescret.firebasestorage.app",

        const data = [
            { t: "오늘 화장실에서 상사 험담을 했는데, 하필 그 칸에 상사가 있었습니다.\n너무 놀라서 손도 안 씻고 도망쳤어요.", c: "Company", r: "To everyone" },
            { t: "엄마가 정성껏 싸주신 도시락을 깜빡하고 두고 왔어요.\n결국 쓰레기통에 버리고 점심은 편의점에서 대충 때웠습니다.", c: "Personal", r: "To you" },
            { t: "여자친구에게 바쁘다고 야근한다고 거짓말하고,\n사실은 집에서 하루 종일 게임만 했습니다.", c: "Personal", r: "To someone" },
            { t: "토익 시험 결과가 나왔는데 지난번보다 100점이나 떨어졌어요.\n부모님께는 시스템 오류로 결과가 안 나왔다고 거짓말했습니다.", c: "Personal", r: "To everyone" },
            { t: "오늘 엘리베이터 거울에 비친 제 정수리를 보고 충격받았습니다.\n언제 이렇게 머리숱이 많이 빠진 걸까요.", c: "Personal", r: "To everyone" },
            { t: "회의 시간에 꾸벅꾸벅 졸다가 제 이름이 불려서 엉뚱한 대답을 했습니다.\n팀원들의 차가운 시선이 아직도 생생해요.", c: "Company", r: "To everyone" },
            { t: "아빠 지갑에서 몰래 만 원을 훔쳤습니다.\n어릴 때 하던 짓을 나이 먹고 또 하다니 너무 한심해요.", c: "Personal", r: "To you" },
            { t: "남자친구가 준 선물이 너무 제 취향이 아니라서 당근마켓에 올려버렸어요.\n제발 남자친구가 보지 않기를 바랍니다.", c: "Personal", r: "To someone" },
            { t: "이번 달 영업 실적이 꼴찌입니다.\n동기들은 다 승진하는데 저만 제자리에 있는 것 같아 너무 우울해요.", c: "Company", r: "To everyone" },
            { t: "웃을 때마다 보이는 누런 이빨 때문에 오늘도 입을 가리고 웃었습니다.\n스케일링 예약하는 것도 무서워요.", c: "Personal", r: "To everyone" },
            { t: "점심시간에 식당에서 밥 먹다가 바지에 국물을 엎질렀어요.\n오후 내내 서류로 가리고 다녔습니다.", c: "Company", r: "To everyone" },
            { t: "동생이 아끼는 한정판 피규어를 청소하다 떨어뜨려 부러뜨렸어요.\n몰래 본드로 붙여놨는데 안 들키겠죠?", c: "Personal", r: "To someone" },
            { t: "데이트 중 배가 너무 아팠는데 참다가 결국 바지에 조금 실수했습니다.\n냄새날까 봐 하루 종일 핑계 대고 떨어져 걸었어요.", c: "Personal", r: "To you" },
            { t: "대학교 졸업 학점이 2점대입니다.\n이력서 쓸 때마다 학점란을 빈칸으로 두고 싶어요.", c: "Society", r: "To everyone" },
            { t: "다리에 털이 너무 많아서 한여름에도 긴 바지만 입습니다.\n왁싱샵에 가는 것조차 부끄러워요.", c: "Personal", r: "To everyone" },
            { t: "중요한 거래처 이메일에 오타를 내서 보냈습니다.\n뒤늦게 '수정본'이라고 다시 보냈지만 이미 제 신뢰도는 바닥이겠죠.", c: "Company", r: "To someone" },
            { t: "명절에 친척들 모이는 게 너무 싫어서 아프다고 핑계 대고 방에만 틀어박혀 있었습니다.", c: "Family", r: "To everyone" },
            { t: "애인의 전 애인 SNS를 몰래 염탐하다가 실수로 좋아요를 눌렀어요.\n1초 만에 취소했지만 알림이 갔을까 봐 미치겠습니다.", c: "Personal", r: "To someone" },
            { t: "프로젝트 마감일인데 아직 절반도 못 끝냈습니다.\n내일 출근해서 무슨 변명을 해야 할지 눈앞이 캄캄해요.", c: "Company", r: "To someone" },
            { t: "남들보다 머리가 유난히 커서 모자가 맞는 게 없습니다.\n오늘 옷가게에서 모자 써보다가 끼어서 혼났어요.", c: "Personal", r: "To everyone" },
            { t: "회사 탕비실에 있는 고급 간식을 몰래 주머니에 잔뜩 챙겨왔습니다.\n나이 먹고 간식에 욕심내는 제 모습이 초라하네요.", c: "Company", r: "To everyone" },
            { t: "치매 걸린 할머니가 제 이름을 까먹으셨을 때,\n슬프기보단 돌보는 게 귀찮다는 생각이 먼저 들었습니다.", c: "Personal", r: "To you" },
            { t: "통장 잔고가 바닥인데 여자친구 앞에서는 있는 척하며 무리해서 오마카세를 샀어요.\n내일부터는 라면만 먹어야 합니다.", c: "Personal", r: "To you" },
            { t: "운전면허 필기시험을 세 번이나 떨어졌습니다.\n친구들한테는 바빠서 시험 못 보러 갔다고 둘러댔어요.", c: "Society", r: "To everyone" },
            { t: "남들보다 뱃살이 유난히 많이 나와서 항상 펑퍼짐한 옷만 입어요.\n목욕탕 가는 것도 너무 싫습니다.", c: "Personal", r: "To everyone" },
            { t: "옆자리 동료의 모니터를 몰래 훔쳐보다가 눈이 마주쳤습니다.\n괜히 모니터 닦는 척하며 시선을 피했어요.", c: "Company", r: "To someone" },
            { t: "부모님 결혼기념일인데 돈이 없어서 축하한다는 말 한마디로 때웠습니다.\n불효자가 된 기분이에요.", c: "Personal", r: "To you" },
            { t: "길 가다가 이상형인 사람을 보고 넋을 잃고 쳐다봤습니다.\n옆에 있던 남자친구가 눈치챈 것 같아 찔려요.", c: "Personal", r: "To someone" },
            { t: "상사에게 보고서를 냈는데, 인터넷에서 거의 다 베껴온 내용입니다.\n깐깐한 상사라 들킬까 봐 심장이 떨려요.", c: "Company", r: "To someone" },
            { t: "발냄새가 너무 심해서 신발 벗는 식당은 절대 안 갑니다.\n오늘도 약속 장소를 서양식 레스토랑으로 우겼어요.", c: "Personal", r: "To everyone" },
            { t: "퇴근길 지하철에서 회사 로고가 박힌 사원증을 메고 임산부석에 앉아버렸습니다.\n누가 사진이라도 찍었을까 무서워요.", c: "Society", r: "To everyone" },
            { t: "어릴 적 동생의 일기장을 몰래 읽고 부모님께 고자질했던 적이 있습니다.\n동생은 아직도 모르지만 늘 미안해요.", c: "Personal", r: "To someone" },
            { t: "애인과 싸우고 홧김에 다른 사람과 데이트 앱으로 매칭돼서 연락을 주고받았어요.\n결국 만나진 않았지만 죄책감이 듭니다.", c: "Personal", r: "To you" },
            { t: "토론 동아리에서 말실수를 해서 모두의 비웃음을 샀습니다.\n똑똑한 척은 다 해놓고 얼굴이 화끈거려요.", c: "Society", r: "To everyone" },
            { t: "짝눈이 심해서 사진 찍을 때마다 스트레스를 받습니다.\n오늘 단체 사진에서도 저만 눈을 게슴츠레하게 뜨고 있네요.", c: "Personal", r: "To everyone" },
            { t: "문서 파쇄기에 넣어야 할 중요 서류를 일반 쓰레기통에 버렸습니다.\n청소 아주머니가 수거해가셨는데 문제 생기면 어쩌죠.", c: "Company", r: "To everyone" },
            { t: "집에 혼자 있을 때 우울증 약을 먹는다는 사실을 아직 아무에게도 말하지 못했습니다.\n가족들이 알면 얼마나 실망할까요.", c: "Personal", r: "To you" },
            { t: "남자친구의 핸드폰 비밀번호를 알아내 몰래 카톡을 다 읽었습니다.\n의심할 만한 건 없었지만 제 자신이 너무 찌질해보여요.", c: "Personal", r: "To someone" },
            { t: "팀 프로젝트에서 제 기여도는 5%도 안 되는데, 발표를 제가 맡았다는 이유로 공을 다 가로챘습니다.", c: "Society", r: "To everyone" },
            { t: "키가 작아서 깔창을 3cm나 깔고 다니는데, 오늘 신발 벗는 룸카페에 갔다가 들통났습니다.\n쥐구멍에라도 숨고 싶어요.", c: "Personal", r: "To everyone" },
            { t: "법인카드로 개인적인 점심 식사를 결제했습니다.\n금액이 작아서 안 걸리겠지 하면서도 계속 불안해요.", c: "Company", r: "To everyone" },
            { t: "아빠의 낡은 구두를 볼 때마다 좋은 구두 하나 사드려야지 마음만 먹고,\n정작 제 명품 가방 사는 데 돈을 다 썼습니다.", c: "Personal", r: "To you" },
            { t: "여자친구가 만들어준 요리가 너무 맛이 없었는데, 맛있다고 과장하며 꾸역꾸역 다 먹었어요.\n집에 와서 소화제 먹었습니다.", c: "Personal", r: "To you" },
            { t: "대학원 입학시험 문제 유출 얘기를 들었는데 고민하다가 모른 척했습니다.\n정정당당하지 못했던 제 자신이 부끄러워요.", c: "Society", r: "To everyone" },
            { t: "어릴 때 다친 흉터가 크게 남아있어서 반팔을 입을 때마다 남들의 시선을 의식하게 됩니다.\n누가 물어볼 때마다 거짓말로 얼버무려요.", c: "Personal", r: "To everyone" },
            { t: "야근수당을 받으려고 할 일도 없으면서 저녁 늦게까지 자리에 앉아있었습니다.\n회삿돈을 갉아먹는 기생충 같아요.", c: "Company", r: "To everyone" },
            { t: "엄마가 사다 놓은 비싼 홍삼 스틱을 몰래 다 까먹고, 오빠가 먹은 척 뒤집어씌웠습니다.", c: "Personal", r: "To someone" },
            { t: "기념일 선물로 받은 명품 지갑, 사실 가품인 걸 알아챘지만 모른 척 연기했습니다.\n애인의 형편을 아니까 더 비참했어요.", c: "Personal", r: "To you" },
            { t: "자격증 시험을 핑계로 휴가를 내고 나서는, 3일 내내 집에서 유튜브만 보며 뒹굴거렸습니다.", c: "Society", r: "To everyone" },
            { t: "땀이 너무 많이 나서 데오드란트를 달고 사는데, 오늘 옷 겨드랑이 부분이 노랗게 변색된 걸 뒤늦게 발견했어요.", c: "Personal", r: "To everyone" }
        ];

        async function insertAll() {
            let count = 0;
            for (let item of data) {
                // Ensure recipient isn't missing. Legacy is "To everyone", but we reduced options to To someone and To you
                // Map To everyone to To someone since we removed To everyone.
                let mappedR = item.r === 'To everyone' ? 'To someone' : item.r;
                let mappedC = item.c === 'Family' ? 'Personal' : item.c;

                await addDoc(secretsCollection, {
                    text: item.t,
                    category: mappedC,
                    recipient: mappedR,
                    adult: false,
                    createdAt: serverTimestamp()
                });
                count++;
            }
            document.body.innerHTML += `<p>Done! Added ${count} secrets.</p>`;
        }
        
        insertAll().catch(e => {
            document.body.innerHTML += `<p style="color:red">Error: ${e.message}</p>`;
        });
    </script>
